<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Book My Ticket">
    <title>Sign In | Book My Ticket</title>

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS compiler via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="font-sans bg-slate-950 text-slate-50 min-h-screen">

    <!-- Main Container -->
    <div class="flex min-h-screen">

        <!-- Left Panel - Branding (Hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 items-center justify-center relative grid-pattern">
            <div class="relative z-10 flex flex-col items-center max-w-[20rem] text-center">
                <a href="/" class="block mb-6">
                    <h2 style="font-size:1.5rem;font-weight:700;color:#fb923c;">🎬 Book My Ticket</h2>
                </a>
                <p class="text-slate-400 text-sm leading-relaxed">
                    Book your favorite movie seats instantly. Fast, secure, and easy.
                </p>
            </div>
        </div>

        <!-- Right Panel - Sign In Form -->
        <div class="w-full lg:w-1/2 flex flex-col p-6 sm:p-8 lg:p-12 lg:border-l border-slate-800">

            <!-- Mobile Logo -->
            <div class="flex justify-center mb-8 lg:hidden">
                <h2 style="font-size:1.25rem;font-weight:700;color:#fb923c;">🎬 Book My Ticket</h2>
            </div>

            <!-- Form Container -->
            <div class="flex-1 flex flex-col justify-center w-full max-w-[28rem] mx-auto">

                <!-- Header -->
                <div class="mb-8">
                    <p class="text-[0.72rem] tracking-[0.16em] uppercase text-slate-400 mb-2">Secure Access</p>
                    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Sign In</h1>
                    <p class="text-slate-400 text-sm">Enter your email and password to sign in.</p>
                </div>

                <!-- Error Alert (hidden by default) -->
                <div id="error-alert"
                    class="bg-red-500/10 border-red-500/20 text-red-400 p-3.5 rounded-lg text-sm border mb-6 animate-fade-in hidden">
                    <span id="error-message">Invalid email or password. Please try again.</span>
                </div>

                <!-- Success Alert (hidden by default) -->
                <div id="success-alert"
                    class="bg-green-500/10 border-green-500/20 text-green-400 p-3.5 rounded-lg text-sm border mb-6 animate-fade-in hidden">
                    <span id="success-message">Login successful! Redirecting...</span>
                </div>

                <!-- Sign In Form -->
                <form id="login-form" class="space-y-6">

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-300 mb-2">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <input type="email" id="email" name="email"
                            class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all focus:outline-none focus:ring-3 focus:ring-orange-400/20"
                            placeholder="you@example.com" required autocomplete="email">
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
                            Password <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <input type="password" id="password" name="password"
                                class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all pr-12"
                                placeholder="Enter your password" required autocomplete="current-password">
                            <!-- Password Toggle -->
                            <button type="button"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-50 p-1 transition-colors bg-transparent border-none cursor-pointer"
                                aria-label="Toggle password visibility" onclick="togglePassword()">
                                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg id="eye-off-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submit-btn"
                        class="inline-flex w-full items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold rounded-lg bg-orange-400 border-orange-400/70 text-[#111827] shadow-[0_10px_24px_-16px_rgba(251,146,60,0.9)] hover:bg-orange-500 hover:-translate-y-[1px] transition-all">
                        Sign In
                    </button>

                </form>

                <!-- Sign Up Link -->
                <p class="mt-8 text-center text-sm text-slate-400">
                    Don't have an account?
                    <a href="/signup"
                        class="text-orange-400 hover:text-orange-500 hover:underline transition-colors font-medium">Create
                        an account</a>
                </p>

            </div>

        </div>

    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/';
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }

        function showError(msg) {
            const alert = document.getElementById('error-alert');
            document.getElementById('error-message').textContent = msg;
            alert.classList.remove('hidden');
            document.getElementById('success-alert').classList.add('hidden');
        }

        function showSuccess(msg) {
            const alert = document.getElementById('success-alert');
            document.getElementById('success-message').textContent = msg;
            alert.classList.remove('hidden');
            document.getElementById('error-alert').classList.add('hidden');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');

            // Disable button while loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Login failed. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    return;
                }

                // Store token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                showSuccess('Login successful! Redirecting...');

                // Redirect to home page after brief delay
                setTimeout(() => {
                    window.location.href = '/';
                }, 800);

            } catch (err) {
                showError('Network error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>

</body>

</html>
