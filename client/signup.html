<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new Book My Ticket account">
    <title>Sign Up | Book My Ticket</title>

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS compiler via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="font-sans bg-slate-950 text-slate-50 min-h-screen">

    <!-- Main Container -->
    <div class="flex min-h-screen">

        <!-- Left Panel - Branding (Hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 items-center justify-center relative grid-pattern">
            <div class="relative z-10 flex flex-col items-center max-w-[20rem] text-center">
                <a href="/" class="block mb-6">
                    <h2 style="font-size:1.5rem;font-weight:700;color:#fb923c;">🎬 Book My Ticket</h2>
                </a>
                <p class="text-slate-400 text-sm leading-relaxed">
                    Join thousands of movie fans. Book your seats in seconds.
                </p>
            </div>
        </div>

        <!-- Right Panel - Sign Up Form -->
        <div class="w-full lg:w-1/2 flex flex-col p-6 sm:p-8 lg:p-12 lg:border-l border-slate-800 overflow-y-auto">

            <!-- Mobile Logo -->
            <div class="flex justify-center mb-8 lg:hidden">
                <h2 style="font-size:1.25rem;font-weight:700;color:#fb923c;">🎬 Book My Ticket</h2>
            </div>

            <!-- Form Container -->
            <div class="flex-1 flex flex-col justify-center w-full max-w-[28rem] mx-auto">

                <!-- Header -->
                <div class="mb-8">
                    <p class="text-[0.72rem] tracking-[0.16em] uppercase text-slate-400 mb-2">Get Started</p>
                    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Create an Account</h1>
                    <p class="text-slate-400 text-sm">Fill in your details to get started</p>
                </div>

                <!-- Error Alert (hidden by default) -->
                <div id="error-alert"
                    class="bg-red-500/10 border-red-500/20 text-red-400 p-3.5 rounded-lg text-sm border mb-6 animate-fade-in hidden">
                    <span id="error-message"></span>
                </div>

                <!-- Success Alert (hidden by default) -->
                <div id="success-alert"
                    class="bg-green-500/10 border-green-500/20 text-green-400 p-3.5 rounded-lg text-sm border mb-6 animate-fade-in hidden">
                    <span id="success-message"></span>
                </div>

                <!-- Sign Up Form -->
                <form id="signup-form" class="space-y-5">

                    <!-- Full Name Field -->
                    <div>
                        <label for="fullname" class="block text-sm font-medium text-slate-300 mb-2">
                            Full Name <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="fullname" name="fullname"
                            class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all focus:outline-none focus:ring-3 focus:ring-orange-400/20"
                            placeholder="John Doe" required autocomplete="name">
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-300 mb-2">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <input type="email" id="email" name="email"
                            class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all focus:outline-none focus:ring-3 focus:ring-orange-400/20"
                            placeholder="you@example.com" required autocomplete="email">
                    </div>

                    <!-- Phone Number Field (Optional) -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-slate-300 mb-2">
                            Phone Number <span class="text-slate-500">(optional)</span>
                        </label>
                        <input type="tel" id="phone" name="phone"
                            class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all focus:outline-none focus:ring-3 focus:ring-orange-400/20"
                            placeholder="+91 98765 43210" autocomplete="tel">
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
                            Password <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <input type="password" id="password" name="password"
                                class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all pr-12"
                                placeholder="Create a strong password" required autocomplete="new-password"
                                minlength="8">
                            <button type="button"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-50 p-1 transition-colors bg-transparent border-none cursor-pointer"
                                aria-label="Toggle password visibility" onclick="togglePassword('password')">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                        <p class="mt-1.5 text-xs text-slate-400 leading-relaxed">
                            Minimum 8 characters
                        </p>
                    </div>

                    <!-- Confirm Password Field -->
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-slate-300 mb-2">
                            Confirm Password <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <input type="password" id="confirm-password" name="confirm-password"
                                class="w-full px-4 py-3 bg-[#0b0b0d] border border-[#24242b] rounded-lg text-slate-50 text-sm focus:outline-none focus:border-orange-400 focus:ring-3 focus:ring-orange-400/20 transition-all pr-12"
                                placeholder="Re-enter your password" required autocomplete="new-password">
                            <button type="button"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-50 p-1 transition-colors bg-transparent border-none cursor-pointer"
                                aria-label="Toggle password visibility" onclick="togglePassword('confirm-password')">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submit-btn"
                        class="inline-flex w-full items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold rounded-lg bg-orange-400 border-orange-400/70 text-[#111827] shadow-[0_10px_24px_-16px_rgba(251,146,60,0.9)] hover:bg-orange-500 hover:-translate-y-[1px] transition-all">
                        Create Account
                    </button>

                </form>

                <!-- Sign In Link -->
                <p class="mt-8 text-center text-sm text-slate-400">
                    Already have an account?
                    <a href="/login"
                        class="text-orange-400 hover:text-orange-500 hover:underline transition-colors font-medium">Sign
                        in</a>
                </p>

            </div>

        </div>

    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/';
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showError(msg) {
            const alert = document.getElementById('error-alert');
            document.getElementById('error-message').textContent = msg;
            alert.classList.remove('hidden');
            document.getElementById('success-alert').classList.add('hidden');
        }

        function showSuccess(msg) {
            const alert = document.getElementById('success-alert');
            document.getElementById('success-message').textContent = msg;
            alert.classList.remove('hidden');
            document.getElementById('error-alert').classList.add('hidden');
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');

            // Client-side validation
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            // Disable button while loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullname, email, phone, password, confirmPassword }),
                });

                const data = await res.json();

                if (!res.ok) {
                    const errorMsg = data.details
                        ? data.details.join('. ')
                        : data.error || 'Registration failed.';
                    showError(errorMsg);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                    return;
                }

                // Store token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                showSuccess('Account created! Redirecting...');

                // Redirect to home page after brief delay
                setTimeout(() => {
                    window.location.href = '/';
                }, 800);

            } catch (err) {
                showError('Network error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>

</body>

</html>
